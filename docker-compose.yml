
services:
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    environment:
      DB_VENDOR: H2
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_RELATIVE_PATH: /auth
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_LOG_LEVEL: info
    command:
    - start-dev 
    - --import-realm
    volumes:
    - ./realm-export.json:/opt/keycloak/data/import/realm-export.json
    # Providers
    # - './providers:/opt/keycloak/providers'
    # Development theme folder
    - './themes/custom-theme/theme:/opt/keycloak/themes'    
    expose:
    - 8080
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /auth/realms/master HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 && cat <&3 | grep -q '200 OK'"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 30s

  oauth2:
    image: quay.io/oauth2-proxy/oauth2-proxy
    depends_on:
      keycloak:
        condition: service_healthy
    command:
    - --config=/etc/oauth2-proxy.cfg
    - --login-url=/auth/realms/myrealm/protocol/openid-connect/auth
    volumes:
    - ./oauth2-proxy.cfg:/etc/oauth2-proxy.cfg
    expose:
    - 4180
      
  nginx:
    image: nginx
    depends_on:
    - oauth2
    - webrtc      
    - keycloak
    ports:
    - 80:80
    volumes:
    - ./nginx.conf:/etc/nginx/conf.d/default.conf   

  webrtc:
    image: mpromonet/webrtc-streamer
    extra_hosts:
    - "host.docker.internal:host-gateway"
    command: ["-C", "config.json", "-R", "50000:50010", "-e", "host.docker.internal"]
    ports:
      - 50000-50010:50000-50010/udp    
    expose:
    - 8000
      

    
